name: Build and Deploy Balrog UI

on:
  push:
    branches:
      - push-zkqpqzxtnryv
  # workflow_dispatch:
  #   inputs:
  #     bucket:
  #       description: "bucket to deploy UI to"
  #       required: true
  #       type: choice
  #       options:
  #         - balrog-stage-admin-static

jobs:
  ui-deploy:
    environment: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # env:
    #   BUCKET: ${{ github.event.inputs.bucket }}
    #   GAR_LOCATION: ${{ vars.GAR_LOCATION }}
    #   GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    #   GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      #
      # - id: gcp-auth
      #   name: Google authentication
      #   uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
      #   with:
      #     token_format: "access_token"
      #     service_account: artifact-writer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
      #     workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
      #
      - name: install deps
        run: yarn install

      - name: build
        run: yarn build
